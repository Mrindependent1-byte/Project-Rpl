<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="style.css">

    <meta charset="UTF-8">
    <title>AspirasiKu</title>
   
        
</head>
<body>

<div class="container">
    <h1>AspirasiKu</h1>
    
    <div class="filter-container">
        <button class="btn-filter" onclick="filterBerita('semua')">Semua</button>
        <button class="btn-filter" onclick="filterBerita('infrastruktur')">Infrastruktur</button>
        <button class="btn-filter" onclick="filterBerita('kesehatan')">Kesehatan</button>
        <button class="btn-filter" onclick="filterBerita('lingkungan')">Lingkungan</button>
    </div>

    <div class="grid-berita" id="grid">
        <div class="card-berita" data-tag="infrastruktur"><h3>Perbaikan Jalan Protokol</h3></div>
        <div class="card-berita" data-tag="kesehatan"><h3>Jadwal Posyandu Serentak</h3></div>
        <div class="card-berita" data-tag="lingkungan"><h3>Program Bank Sampah</h3></div>
    </div>
</div>

<script>
    function filterBerita(kategori) {
        const cards = document.querySelectorAll('.card-berita');
        cards.forEach(card => {
            if (kategori === 'semua' || card.getAttribute('data-tag') === kategori) {
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });
    }
</script>

</body>
</html>
