<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>AspirasiKu - Pusat Pengaduan</title>
    <style>
        /* Desain Utama */
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; }
        .navbar { background: #800000; color: white; padding: 20px; font-size: 24px; font-weight: bold; }
        .container { padding: 30px; }
        
        /* Tombol */
        .btn { padding: 12px 25px; margin-right: 10px; cursor: pointer; border: none; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: 0.3s; }
        .btn:hover { background: #800000; color: white; }
        
        /* Kartu Informasi */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 12px; border-left: 5px solid #800000; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div class="navbar">AspirasiKu</div>

<div class="container">
    <h2>Daftar Aspirasi</h2>
    <div id="filter-area">
        <button class="btn" onclick="alert('Infrastruktur: Jalan rusak di Jl. Merdeka sedang dikerjakan.')">Infrastruktur</button>
        <button class="btn" onclick="alert('Kesehatan: Jadwal Posyandu RW 05 hari Sabtu jam 08:00.')">Kesehatan</button>
        <button class="btn" onclick="alert('Lingkungan: Pengambilan sampah dilakukan setiap Selasa & Jumat.')">Lingkungan</button>
    </div>

    <div class="grid">
        <div class="card"><h3>Jalan Protokol</h3><p>Status: Dalam proses perbaikan.</p></div>
        <div class="card"><h3>Posyandu</h3><p>Status: Jadwal sudah rilis.</p></div>
        <div class="card"><h3>Bank Sampah</h3><p>Status: Program aktif.</p></div>
    </div>
</div>

</body>
</html>
